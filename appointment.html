<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Beauty Studio | Appointment</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f7f3ef;
            color:#333;
        }

        .container{
            width:90%;
            max-width:700px;
            margin:60px auto;
        }

        .card{
            background:#fff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            color:#8b5e3c;
        }

        p{
            text-align:center;
            color:#777;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:10px;
            background:#8b5e3c;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#6f4729;
        }

        #status{
            margin-top:20px;
            text-align:center;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Book Your Appointment</h1>

<p>Relax • Refresh • Rejuvenate</p>

<form id="appointmentForm">
    
<div class="form-group">
<label>Full Name</label>
<input
type="text"
name="name"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
name="email"
required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input
type="tel"
name="phone"
required>
</div>

<div class="form-group">
<label>Service</label>

<select name="service" required>

<option value="">Choose Service</option>

<option>Facial Treatment</option>

<option>Body Massage</option>

<option>Hair Spa</option>

<option>Skin Care Consultation</option>

<option>Premium Package</option>

</select>

</div>

<div class="form-group">
<label>Appointment Date</label>

<input
type="date"
name="date"
required>

</div>

<div class="form-group">

<label>Additional Notes</label>

<textarea
name="message"
placeholder="Write your request..."></textarea>

</div>

<button
    id="submitBtn"
    type="submit">

    Book Appointment

</button>

</form>

<div id="status"></div>

</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzl-6Cu0zO_rTNk7O-6n8P6G23Q3Cu8uqwYqO8qlTfxD2CqtsCEB0usrOeSecdn6-UqZA/exec";

const form = document.getElementById("appointmentForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Submitting...";

    try {

        const formData = new FormData(form);

        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (result.result === "success") {

            status.style.color = "green";
            status.innerHTML = "✔ Appointment booked successfully.";

            form.reset();

        } else {

            throw new Error("Submission failed.");

        }

    } catch (error) {

        console.error(error);

        status.style.color = "red";
        status.innerHTML = "✖ Failed to submit appointment.";

    }

    btn.disabled = false;
    btn.innerText = "Book Appointment";

});
</script>
</body>
</html>
